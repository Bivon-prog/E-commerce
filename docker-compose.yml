version: '3.8'

services:
  backend:
    build:
      context: ./django-backend
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - ./django-backend/.env
    restart: always

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8082/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
